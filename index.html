<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3TV – La Télé Interactive</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: white; font-family: sans-serif; padding: 15px; }
        .container { max-width: 480px; margin: 0 auto; }

        /* LOGO 3D CSS */
        .logo-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .logo-main-container { display: flex; align-items: center; justify-content: center; position: relative; }
        .plates-container { position: relative; width: 60px; height: 70px; }
        .plate { position: absolute; border-radius: 12px; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .plate.yellow { background: #FBC02D; width: 50px; height: 60px; left: 0; bottom: 0; z-index: 1; }
        .plate.red { background: #D32F2F; width: 50px; height: 60px; left: 8px; bottom: 4px; z-index: 2; }
        .plate.blue { background: #1D4E89; width: 55px; height: 65px; left: 16px; top: 0; z-index: 3; display: flex; align-items: center; justify-content: center; }
        .logo-3 { font-size: 45px; font-weight: 900; color: white; }
        .logo-tv-text { font-size: 45px; font-weight: 900; color: #1D4E89; margin-left: 20px; }
        .slogan { margin-top: 10px; font-weight: bold; font-size: 14px; text-align: center; }
        .slogan span { color: #D32F2F; text-transform: uppercase; }

        /* LECTEUR VIDÉO PRO */
        .video-wrapper { background: #000; border-radius: 15px; overflow: hidden; margin: 15px 0; aspect-ratio: 16/9; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        video { width: 100%; height: 100%; display: block; }

        /* BOUTONS ACTIONS */
        .actions { display: flex; justify-content: space-around; margin: 15px 0; }
        .btn { border: none; background: #f0f0f0; padding: 12px 18px; border-radius: 30px; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* SECTIONS DÉFILANTES (Marquee) */
        .h-section { margin: 20px 0; }
        .h-title { font-size: 14px; font-weight: 800; color: #1D4E89; margin-bottom: 10px; text-transform: uppercase; border-left: 4px solid #FBC02D; padding-left: 8px; }
        .scroll-box { overflow-x: auto; display: flex; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .scroll-box::-webkit-scrollbar { display: none; }

        .card { min-width: 130px; background: #f9f9f9; border-radius: 10px; padding: 8px; border: 1px solid #eee; text-align: center; }
        .card img { width: 100%; border-radius: 5px; margin-bottom: 5px; }
        .card h4 { font-size: 11px; color: #333; }

        /* FOOTER & RECEPTION */
        .info-box { background: #1D4E89; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .tiktok-link { display: block; background: #000; color: white; padding: 10px; border-radius: 25px; text-decoration: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo-main-container">
                <div class="plates-container">
                    <div class="plate yellow"></div> <div class="plate red"></div>
                    <div class="plate blue"><span class="logo-3">3</span></div>
                </div>
                <span class="logo-tv-text">tv</span>
            </div>
            <p class="slogan">LA TÉLÉ <span>Interactive</span></p>
        </div>

        <div class="video-wrapper">
            <video id="tv-player" controls playsinline poster="https://via.placeholder.com/640x360/1D4E89/FFFFFF?text=LANCEMENT+3TV..."></video>
        </div>

        <div class="actions">
            <button class="btn" onclick="forcerLecture()">▶️ REGARDER</button>
            <button class="btn" onclick="partager()">📤 PARTAGER</button>
            <button class="btn" onclick="alert('L\'application arrive bientôt !')">⬇️ TÉLÉCHARGER</button>
        </div>

        <div class="h-section">
            <p class="h-title">Dernières Émissions</p>
            <div id="emissions-list" class="scroll-box"></div>
        </div>

        <div class="h-section">
            <p class="h-title">Nos Partenaires</p>
            <div id="partners-list" class="scroll-box"></div>
        </div>

        <div class="info-box" id="info-box">
            <p id="reception">📡 Chargement des fréquences...</p>
            <a href="#" id="tk-btn" class="tiktok-link">SUIVRE SUR TIKTOK</a>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDEU3NRoFDPuGbt3PlgY5YBjOccq_HCrUM",
            authDomain: "tv-b6897.firebaseapp.com",
            databaseURL: "https://tv-b6897-default-rtdb.firebaseio.com",
            projectId: "tv-b6897",
            storageBucket: "tv-b6897.firebasestorage.app",
            messagingSenderId: "962702463807",
            appId: "1:962702463807:web:487f8d597f8467c41eb98a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const video = document.getElementById('tv-player');
        let hls = null;

        // FONCTION DE DIFFUSION EN TEMPS RÉEL (HLS)
        function diffuser(url) {
            if (!url) return;
            
            // Si Hls.js est supporté (Android, Chrome, Infinix)
            if (Hls.isSupported()) {
                if (hls) hls.destroy(); // On nettoie l'ancien flux
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => console.log("Lecture auto bloquée"));
                });
            } 
            // Pour Safari/iPhone qui lisent le HLS nativement
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        // ÉCOUTEUR FIREBASE "MAGIC" (Mise à jour sans recharger)
        db.ref('3tv_config').on('value', (snap) => {
            const data = snap.val();
            if (!data) return;

            // 1. Changement immédiat du lien vidéo dès que tu le colles dans Firebase
            if (data.directUrl) {
                // On ne relance le flux que si l'URL a changé
                if (video.dataset.currentUrl !== data.directUrl) {
                    video.dataset.currentUrl = data.directUrl;
                    diffuser(data.directUrl);
                }
            }

            // 2. Mise à jour des textes
            document.getElementById('reception').innerHTML = `📡 ${data.canal || 'Canal+'} | 📺 ${data.tnt || 'TNT'}`;
            document.getElementById('tk-btn').href = `https://tiktok.com/@${data.tiktok || '3tv.bf'}`;

            // 3. Mise à jour des listes (Émissions & Partenaires)
            updateList('emissions-list', data.emissions, 'REPLAY');
            updateList('partners-list', data.pubs, 'PARTENAIRE');
        });

        function updateList(id, list, tag) {
            const container = document.getElementById(id);
            if (!list) { container.innerHTML = "<p style='font-size:10px'>Bientôt...</p>"; return; }
            container.innerHTML = list.map(item => `
                <div class="card" onclick="diffuser('${item.url}')">
                    <div style="background:#ddd; height:70px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#1D4E89">${tag}</div>
                    <h4>${item.nom || item.titre}</h4>
                </div>
            `).join('');
        }

        function forcerLecture() { video.play(); }
        function partager() {
            if (navigator.share) { navigator.share({title: '3TV', url: window.location.href}); }
            else { alert("Lien copié : " + window.location.href); }
        }
    </script>
</body>
  </html>
